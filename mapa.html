<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Edificios - Demet Toreo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Mapa interactivo de edificios y puertas de acceso de Demet Toreo I y II. Busca un edificio y ubica puertas de acceso vehicular." />
    <meta name="theme-color" content="#2b7cff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Demet Toreo" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Demet Toreo I y II - Mapa interactivo de Edificios" />
    <meta property="og:description" content="Busca edificios y puertas de acceso en Demet Toreo. Mapa interactivo con geolocalización." />
    <meta property="og:image" content="icons/icon-512.png" />
    <meta property="og:locale" content="es_MX" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
</head>
<body>

<div id="splash">
    <img src="icons/icon-192.png" alt="Demet Toreo" />
    <span class="splash-title">Demet Toreo</span>
    <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<div id="search-container" role="search" aria-label="Buscar edificio en el mapa">
    <div class="search-row">
        <input type="text" id="busqueda" placeholder="Buscar edificio..." autocomplete="off"
               aria-label="Nombre del edificio" aria-autocomplete="list" aria-controls="sugerencias"
               oninput="mostrarSugerencias()" onkeydown="teclaBusqueda(event)" onfocus="document.getElementById('busqueda').value=''; mostrarSugerencias();">
        <button type="button" class="btn-icon" onclick="buscar()" aria-label="Buscar edificio" title="Buscar">⌕</button>
    </div>
    <ul id="sugerencias" role="listbox" aria-label="Sugerencias de edificios"></ul>
    <div class="pill-bar">
        <button type="button" class="pill" onclick="irAMiUbicacion()" id="btn-ubicacion" aria-label="Mi ubicación" title="Mi ubicación (Ctrl+L)">
            <span class="pill-icon">📍</span>Mi ubicación
        </button>
        <button type="button" class="pill" id="btn-capa" onclick="toggleCapa()" aria-label="Cambiar capa del mapa" title="Cambiar a Satélite">
            <span class="pill-icon">🛰️</span>Satélite
        </button>
        <button type="button" class="pill pill-edificio" id="btn-compartir" onclick="compartirEdificio()" aria-label="Compartir enlace" title="Compartir (Ctrl+Shift+C)" style="display:none;">
            <span class="pill-icon">🔗</span>Compartir
        </button>
        <button type="button" class="pill pill-edificio" id="btn-llegar" onclick="comoLlegar()" aria-label="Cómo llegar" title="Cómo llegar" style="display:none;">
            <span class="pill-icon">🧭</span>Cómo llegar
        </button>
    </div>
</div>

<div id="map" role="application" aria-label="Mapa de edificios Demet Toreo I y II"></div>
<div id="version-badge" style="position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,0.45);color:#fff;padding:2px 8px;border-radius:6px;font-size:0.7rem;pointer-events:none;"></div>

<script src="app.js"></script>

</body>
</html>
