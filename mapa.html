<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Edificios - Demet Toreo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Mapa de edificios y puertas de acceso de Demet Toreo. Busca un edificio y ubica puertas de acceso vehicular." />
    <meta name="theme-color" content="#2b7cff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Demet Toreo" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Demet Toreo - Mapa de Edificios" />
    <meta property="og:description" content="Busca edificios y puertas de acceso en Demet Toreo. Mapa interactivo con geolocalización." />
    <meta property="og:image" content="icons/icon-512.png" />
    <meta property="og:locale" content="es_MX" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
</head>
<body>

<div id="splash">
    <img src="icons/icon-192.png" alt="Demet Toreo" />
    <span class="splash-title">Demet Toreo</span>
    <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<div id="search-container" role="search" aria-label="Buscar edificio en el mapa">
    <div class="search-row">
        <input type="text" id="busqueda" placeholder="Buscar edificio..." autocomplete="off"
               aria-label="Nombre del edificio" aria-autocomplete="list" aria-controls="sugerencias"
               oninput="mostrarSugerencias()" onkeydown="teclaBusqueda(event)" onfocus="document.getElementById('busqueda').value=''; mostrarSugerencias();">
        <button type="button" onclick="buscar()" aria-label="Buscar edificio">Buscar</button>
    </div>
    <ul id="sugerencias" role="listbox" aria-label="Sugerencias de edificios"></ul>
    <div style="display:flex; gap:6px; width:100%; flex-wrap: wrap;">
        <button type="button" onclick="irAMiUbicacion()" aria-label="Centrar mapa en mi ubicación" title="Centrar en mi ubicación (Ctrl+L)">📍 Mi ubicación</button>
        <button type="button" class="secondary" id="btn-compartir" onclick="compartirEdificio()" aria-label="Compartir enlace del edificio seleccionado" title="Compartir edificio (Ctrl+Shift+C)" style="display:none;">🔗 Compartir</button>
        <button type="button" class="secondary" id="btn-llegar" onclick="comoLlegar()" aria-label="Abrir navegación al edificio" title="Cómo llegar al edificio" style="display:none;">🧭 Cómo llegar</button>
        <button type="button" class="secondary" id="toggle-puertas-btn" onclick="togglePuertas()" aria-label="Mostrar u ocultar puertas de acceso" title="Mostrar/ocultar puertas de acceso">🚘 Mostrar Accesos</button>
    </div>
</div>

<div id="map" role="application" aria-label="Mapa de edificios Demet Toreo"></div>
<div id="version-badge" style="position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,0.45);color:#fff;padding:2px 8px;border-radius:6px;font-size:0.7rem;pointer-events:none;"></div>

<script src="app.js"></script>

</body>
</html>
